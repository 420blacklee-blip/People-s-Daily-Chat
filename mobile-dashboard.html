<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>私人通道控制终端</title>
    <style>
        :root {
            --bg: #070911;
            --text: #f8fbff;
            --muted: rgba(248, 251, 255, 0.62);
            --faint: rgba(248, 251, 255, 0.36);
            --line: rgba(255, 255, 255, 0.22);
            --glass: rgba(255, 255, 255, 0.14);
            --glass-strong: rgba(255, 255, 255, 0.22);
            --blue: #5ac8fa;
            --indigo: #7c6cff;
            --green: #34c759;
            --orange: #ff9f0a;
            --red: #ff453a;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
            --radius-xl: 30px;
            --radius-lg: 24px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background:
                radial-gradient(circle at 20% 12%, rgba(90, 200, 250, 0.42), transparent 31%),
                radial-gradient(circle at 84% 8%, rgba(124, 108, 255, 0.40), transparent 28%),
                radial-gradient(circle at 50% 94%, rgba(52, 199, 89, 0.24), transparent 30%),
                linear-gradient(160deg, #0b1020 0%, #090b15 44%, #03040a 100%);
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            filter: blur(12px);
            opacity: 0.74;
            pointer-events: none;
        }

        body::before {
            left: -110px;
            top: 11%;
            background: radial-gradient(circle, rgba(90, 200, 250, 0.45), rgba(90, 200, 250, 0));
        }

        body::after {
            right: -130px;
            bottom: 9%;
            background: radial-gradient(circle, rgba(124, 108, 255, 0.42), rgba(124, 108, 255, 0));
        }

        .toast {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 14px);
            left: 50%;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: calc(100vw - 34px);
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            background: rgba(20, 24, 34, 0.62);
            color: #fff;
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(26px) saturate(170%);
            -webkit-backdrop-filter: blur(26px) saturate(170%);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
            opacity: 0;
            transform: translate(-50%, -18px) scale(0.96);
            transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }

        .toast-icon {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            font-size: 13px;
            flex: 0 0 auto;
        }

        .shell {
            width: min(100%, 430px);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
        }

        .hero {
            padding: 8px 6px 0;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--green);
            box-shadow: 0 0 0 5px rgba(52, 199, 89, 0.14), 0 0 18px rgba(52, 199, 89, 0.75);
        }

        .hero h1 {
            margin-top: 14px;
            font-size: clamp(32px, 9vw, 46px);
            line-height: 0.98;
            letter-spacing: 0;
            font-weight: 760;
            text-wrap: balance;
        }

        .hero p {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .glass {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)),
                var(--glass);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.24), inset 0 -1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(34px) saturate(175%);
            -webkit-backdrop-filter: blur(34px) saturate(175%);
        }

        .glass::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 16% 0%, rgba(255, 255, 255, 0.30), transparent 34%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 32%);
            pointer-events: none;
        }

        .wallet {
            border-radius: var(--radius-lg);
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            position: relative;
            z-index: 1;
            padding: 13px;
            border-radius: 19px;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .metric-label {
            color: var(--faint);
            font-size: 12px;
            font-weight: 700;
        }

        .metric-value {
            margin-top: 8px;
            font-family: ui-rounded, "SF Pro Rounded", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 34px;
            line-height: 1;
            font-weight: 650;
            letter-spacing: 0;
            transition: color 0.35s ease, transform 0.2s ease;
        }

        .metric-value.cost {
            color: var(--blue);
        }

        .control-card {
            border-radius: var(--radius-xl);
            padding: 20px;
        }

        .card-head {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .card-title {
            font-size: 19px;
            font-weight: 760;
            letter-spacing: 0;
        }

        .card-caption {
            margin-top: 5px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .time-pill {
            flex: 0 0 auto;
            min-width: 92px;
            padding: 10px 12px;
            border-radius: 18px;
            text-align: right;
            background: rgba(90, 200, 250, 0.16);
            border: 1px solid rgba(90, 200, 250, 0.28);
            color: #dff6ff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        #sliderValueText {
            font-family: ui-rounded, "SF Pro Rounded", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 25px;
            line-height: 1;
            font-weight: 760;
        }

        .slider-unit {
            margin-left: 2px;
            color: rgba(223, 246, 255, 0.72);
            font-size: 12px;
            font-weight: 700;
        }

        .slider-wrap {
            position: relative;
            z-index: 1;
            margin-top: 24px;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 42px;
            background: transparent;
            display: block;
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background:
                linear-gradient(90deg, var(--blue), var(--indigo)) 0 / var(--slider-fill, 26.3%) 100% no-repeat,
                rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.26);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 30px;
            height: 30px;
            margin-top: -10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: linear-gradient(180deg, #ffffff, #dceeff);
            box-shadow: 0 9px 24px rgba(90, 200, 250, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform 0.18s cubic-bezier(0.2, 1, 0.2, 1);
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.12);
        }

        input[type=range]::-moz-range-track {
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background:
                linear-gradient(90deg, var(--blue), var(--indigo)) 0 / var(--slider-fill, 26.3%) 100% no-repeat,
                rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.26);
        }

        input[type=range]::-moz-range-thumb {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: linear-gradient(180deg, #ffffff, #dceeff);
            box-shadow: 0 9px 24px rgba(90, 200, 250, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .bounds {
            display: flex;
            justify-content: space-between;
            margin-top: 2px;
            color: var(--faint);
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 11px;
            font-weight: 700;
        }

        .btn-primary,
        .btn-copy {
            position: relative;
            z-index: 1;
            width: 100%;
            border: 0;
            border-radius: 21px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            font-weight: 750;
            transition: transform 0.18s cubic-bezier(0.2, 1, 0.2, 1), opacity 0.18s ease;
        }

        .btn-primary {
            margin-top: 22px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(90, 200, 250, 0.96), rgba(124, 108, 255, 0.96));
            box-shadow: 0 18px 36px rgba(90, 160, 255, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.42);
        }

        .btn-primary:active,
        .btn-copy:active {
            transform: scale(0.975);
        }

        .btn-primary:disabled {
            opacity: 0.48;
            transform: none;
            cursor: wait;
        }

        .result-panel {
            display: none;
            border-radius: var(--radius-xl);
            padding: 18px;
            animation: rise 0.38s cubic-bezier(0.2, 1, 0.2, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 118px 1fr;
            gap: 16px;
            align-items: center;
        }

        .circular-timer {
            position: relative;
            width: 118px;
            height: 118px;
        }

        .circular-timer svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 14px rgba(90, 200, 250, 0.28));
        }

        .timer-track,
        .timer-progress {
            cx: 59px;
            cy: 59px;
            r: 52px;
            fill: transparent;
            stroke-width: 7px;
        }

        .timer-track {
            stroke: rgba(255, 255, 255, 0.12);
        }

        .timer-progress {
            stroke: var(--blue);
            stroke-linecap: round;
            stroke-dasharray: 326.73;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.7s cubic-bezier(0.2, 1, 0.2, 1), stroke 0.35s ease;
        }

        .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-value {
            font-family: ui-rounded, "SF Pro Rounded", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 28px;
            line-height: 1;
            font-weight: 720;
        }

        .time-label {
            margin-top: 5px;
            color: var(--faint);
            font-size: 11px;
            font-weight: 700;
        }

        .result-copy {
            min-width: 0;
        }

        .result-title {
            font-size: 17px;
            font-weight: 760;
            letter-spacing: 0;
        }

        .result-note {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .btn-copy {
            margin-top: 13px;
            padding: 13px 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-copy svg {
            width: 17px;
            height: 17px;
        }

        @media (max-height: 720px) {
            body {
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .shell {
                gap: 10px;
            }

            .hero h1 {
                font-size: 32px;
                margin-top: 10px;
            }

            .hero p {
                display: none;
            }

            .wallet,
            .control-card,
            .result-panel {
                padding: 14px;
            }

            .metric-value {
                font-size: 29px;
            }

            .slider-wrap {
                margin-top: 14px;
            }

            .btn-primary {
                margin-top: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✓</span>
        <span id="toastMsg">操作成功</span>
    </div>

    <main class="shell">
        <section class="hero">
            <div class="eyebrow"><span class="live-dot"></span> 私人通道控制台</div>
            <h1>{{UID}}</h1>
            <p>创建一次性加密聊天室。计时会在首位用户进入后开始，最长 600 秒。</p>
        </section>

        <section class="glass wallet" id="financePanel">
            <div class="metric">
                <div class="metric-label">可用配额</div>
                <div class="metric-value" id="balanceDisplay">{{BALANCE}}</div>
            </div>
            <div class="metric">
                <div class="metric-label">单次消耗</div>
                <div class="metric-value cost" id="costDisplay">-{{COST}}</div>
            </div>
        </section>

        <section class="glass control-card">
            <div class="card-head">
                <div>
                    <div class="card-title">聊天室存活时间</div>
                    <div class="card-caption">选择房间闲置销毁时间，上限 600 秒。</div>
                </div>
                <div class="time-pill">
                    <span id="sliderValueText">180</span><span class="slider-unit">s</span>
                </div>
            </div>

            <div class="slider-wrap">
                <input type="range" id="safeTimeInput" min="30" max="600" step="10" value="180">
                <div class="bounds">
                    <span>30s</span>
                    <span>600s</span>
                </div>
            </div>

            <button class="btn-primary" id="generateBtn" onclick="generateRoom()">创建聊天室</button>
        </section>

        <section class="glass result-panel" id="resultPanel">
            <div class="result-grid">
                <div class="circular-timer">
                    <svg>
                        <circle class="timer-track"></circle>
                        <circle class="timer-progress" id="progressRing"></circle>
                    </svg>
                    <div class="timer-text">
                        <div class="time-value" id="countdownText">180</div>
                        <div class="time-label">剩余秒数</div>
                    </div>
                </div>

                <div class="result-copy">
                    <div class="result-title">聊天室已建立</div>
                    <div class="result-note">链接仅保存在当前页面内存中，点击复制后发送给用户。</div>
                    <button class="btn-copy" id="copyUrlBtn" onclick="copyRoomUrl()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        复制直连地址
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentBalance = parseInt("{{BALANCE}}") || 0;
        const cost = parseInt("{{COST}}") || 0;
        const accessPath = "{{ACCESS_PATH}}" || "";
        const MAX_SAFE_TIME = 600;

        let heartbeatInterval = null;
        let activeRoomUrl = "";

        const CIRCUMFERENCE = 326.73;
        const safeTimeInput = document.getElementById('safeTimeInput');
        const sliderValueText = document.getElementById('sliderValueText');

        function clampSafeTime(value) {
            const parsed = parseInt(value, 10);
            if (!Number.isFinite(parsed)) return 180;
            return Math.min(MAX_SAFE_TIME, Math.max(30, parsed));
        }

        function updateSliderFill() {
            const min = parseFloat(safeTimeInput.min);
            const max = parseFloat(safeTimeInput.max);
            const val = clampSafeTime(safeTimeInput.value);
            if (String(val) !== safeTimeInput.value) safeTimeInput.value = val;
            const percentage = ((val - min) / (max - min)) * 100;
            sliderValueText.innerText = val;
            safeTimeInput.style.setProperty('--slider-fill', `${percentage}%`);
        }

        safeTimeInput.addEventListener('input', updateSliderFill);
        updateSliderFill();

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');

            toastMsg.innerText = message;
            icon.innerText = isError ? "!" : "✓";
            icon.style.color = isError ? "var(--red)" : "var(--green)";

            toast.classList.add('show');
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function copyRoomUrl() {
            if (!activeRoomUrl) return;

            try {
                await navigator.clipboard.writeText(activeRoomUrl);
                showToast("直连地址已复制");
            } catch (err) {
                showToast("系统复制权限受限，请重试", true);
            }
        }

        async function generateRoom() {
            const safeTime = clampSafeTime(document.getElementById('safeTimeInput').value);
            const btn = document.getElementById('generateBtn');
            const resultPanel = document.getElementById('resultPanel');

            if (currentBalance < cost) {
                showToast("配额不足，请联系系统管理员", true);
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在创建...";
            resultPanel.style.opacity = '1';
            resultPanel.style.transform = 'translateY(0) scale(1)';

            try {
                const response = await fetch('/api/admin/generate_room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        safe_time: safeTime,
                        access_path: accessPath
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    const balanceEl = document.getElementById('balanceDisplay');
                    if (data.balance !== undefined) {
                        currentBalance = data.balance;
                        balanceEl.innerText = currentBalance;
                        balanceEl.style.color = 'var(--green)';
                        balanceEl.style.transform = 'scale(1.08)';
                        setTimeout(() => {
                            balanceEl.style.color = 'var(--text)';
                            balanceEl.style.transform = 'scale(1)';
                        }, 500);
                    }

                    activeRoomUrl = `${window.location.origin}/#${data.room_pwd}`;
                    resultPanel.style.display = 'block';
                    showToast("聊天室已创建，点击复制直连地址");
                    startServerHeartbeat(safeTime, data.room_pwd);
                } else {
                    showToast(data.msg || "鉴权失败或网络拦截", true);
                }
            } catch (error) {
                console.error(error);
                showToast("连接服务器超时，请稍后重试", true);
            } finally {
                btn.disabled = false;
                btn.innerText = "创建聊天室";
            }
        }

        function startServerHeartbeat(totalSeconds, roomPwd) {
            const textElem = document.getElementById('countdownText');
            const progressRing = document.getElementById('progressRing');
            const resultPanel = document.getElementById('resultPanel');

            textElem.innerText = totalSeconds;
            progressRing.style.strokeDashoffset = '0';
            progressRing.style.stroke = 'var(--blue)';
            resultPanel.style.display = 'block';

            if (heartbeatInterval) clearInterval(heartbeatInterval);

            heartbeatInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/room/time_left?room_pwd=${roomPwd}`);
                    const statusData = await res.json();

                    if (statusData.status === 'closed' || statusData.remaining_time <= 0) {
                        clearInterval(heartbeatInterval);
                        textElem.innerText = "0";
                        progressRing.style.strokeDashoffset = CIRCUMFERENCE;
                        progressRing.style.stroke = 'rgba(255, 255, 255, 0.18)';
                        activeRoomUrl = "";

                        setTimeout(() => {
                            resultPanel.style.transition = 'all 0.5s cubic-bezier(0.2, 1, 0.2, 1)';
                            resultPanel.style.opacity = '0';
                            resultPanel.style.transform = 'translateY(12px) scale(0.96)';

                            setTimeout(() => {
                                resultPanel.style.display = 'none';
                                resultPanel.style.opacity = '1';
                                resultPanel.style.transform = 'translateY(0) scale(1)';
                                showToast("安全通道已关闭并清理完毕");
                            }, 520);
                        }, 900);
                    } else {
                        const timeLeft = Math.min(totalSeconds, statusData.remaining_time);
                        textElem.innerText = timeLeft;

                        const percentage = timeLeft / totalSeconds;
                        const validPercentage = Math.min(Math.max(percentage, 0), 1);
                        progressRing.style.strokeDashoffset = CIRCUMFERENCE - (validPercentage * CIRCUMFERENCE);

                        if (validPercentage > 0.5) {
                            progressRing.style.stroke = 'var(--blue)';
                        } else if (validPercentage <= 0.2) {
                            progressRing.style.stroke = 'var(--red)';
                        } else {
                            progressRing.style.stroke = 'var(--orange)';
                        }
                    }
                } catch (error) {
                    console.warn("探针网络闪断，等待重连恢复...");
                }
            }, 1000);
        }
    </script>
</body>
</html>
