<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>私人通道控制终端</title>
    <style>
        :root {
            --bg: #050814;
            --text: #f8fbff;
            --muted: rgba(248, 251, 255, 0.66);
            --faint: rgba(248, 251, 255, 0.42);
            --line: rgba(255, 255, 255, 0.32);
            --glass: rgba(255, 255, 255, 0.18);
            --glass-strong: rgba(255, 255, 255, 0.30);
            --blue: #5ac8fa;
            --indigo: #7c6cff;
            --green: #34c759;
            --orange: #ff9f0a;
            --red: #ff453a;
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
            --radius-xl: 34px;
            --radius-lg: 24px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background:
                radial-gradient(circle at 14% 14%, rgba(90, 200, 250, 0.46), transparent 30%),
                radial-gradient(circle at 88% 12%, rgba(124, 108, 255, 0.46), transparent 31%),
                radial-gradient(circle at 26% 92%, rgba(52, 199, 89, 0.26), transparent 28%),
                radial-gradient(circle at 78% 78%, rgba(255, 255, 255, 0.10), transparent 24%),
                linear-gradient(150deg, #0d1829 0%, #080b19 42%, #03050c 100%);
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.82;
            pointer-events: none;
        }

        body::before {
            left: -110px;
            top: 11%;
            background: radial-gradient(circle, rgba(90, 200, 250, 0.45), rgba(90, 200, 250, 0));
        }

        body::after {
            right: -130px;
            bottom: 9%;
            background: radial-gradient(circle, rgba(124, 108, 255, 0.42), rgba(124, 108, 255, 0));
        }

        .toast {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 14px);
            left: 50%;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: calc(100vw - 34px);
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            background: rgba(20, 24, 34, 0.62);
            color: #fff;
            box-shadow: 0 16px 44px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(26px) saturate(170%);
            -webkit-backdrop-filter: blur(26px) saturate(170%);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
            opacity: 0;
            transform: translate(-50%, -18px) scale(0.96);
            transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }

        .toast-icon {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            font-size: 13px;
            flex: 0 0 auto;
        }

        .shell {
            width: min(100%, 420px);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
        }

        .orb {
            position: fixed;
            border-radius: 999px;
            pointer-events: none;
            opacity: 0.55;
            filter: blur(2px);
        }

        .orb-a {
            width: 84px;
            height: 84px;
            left: 12%;
            top: 17%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(90,200,250,0.22) 42%, transparent 72%);
        }

        .orb-b {
            width: 112px;
            height: 112px;
            right: 9%;
            bottom: 18%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.72), rgba(124,108,255,0.22) 45%, transparent 74%);
        }

        .app-card {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-xl);
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.10) 42%, rgba(255,255,255,0.16)),
                rgba(114, 128, 150, 0.23);
            box-shadow:
                var(--shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.48),
                inset 0 -1px 0 rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(44px) saturate(190%) brightness(1.08);
            -webkit-backdrop-filter: blur(44px) saturate(190%) brightness(1.08);
        }

        .app-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.46), transparent 28%),
                radial-gradient(circle at 70% 80%, rgba(90, 200, 250, 0.16), transparent 38%),
                linear-gradient(120deg, rgba(255,255,255,0.32), transparent 28%, rgba(255,255,255,0.10) 58%, transparent 76%);
            pointer-events: none;
        }

        .app-card::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: calc(var(--radius-xl) - 1px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 13px 13px;
            mix-blend-mode: overlay;
            opacity: 0.28;
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .topbar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--green);
            box-shadow: 0 0 0 5px rgba(52, 199, 89, 0.14), 0 0 18px rgba(52, 199, 89, 0.75);
        }

        .identity-row {
            margin-top: 18px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 14px;
        }

        .identity-row h1 {
            min-width: 0;
            font-size: clamp(40px, 12vw, 58px);
            line-height: 0.98;
            letter-spacing: 0;
            font-weight: 820;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
        }

        .mini-status {
            flex: 0 0 auto;
            padding: 8px 11px;
            border-radius: 17px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(0, 0, 0, 0.12);
            color: rgba(255,255,255,0.74);
            font-size: 12px;
            font-weight: 720;
        }

        .metrics {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            position: relative;
            padding: 14px;
            border-radius: 22px;
            background:
                linear-gradient(150deg, rgba(255,255,255,0.24), rgba(255,255,255,0.08)),
                rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        .metric-label {
            color: var(--faint);
            font-size: 12px;
            font-weight: 700;
        }

        .metric-value {
            margin-top: 8px;
            font-family: ui-rounded, "SF Pro Rounded", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 34px;
            line-height: 1;
            font-weight: 650;
            letter-spacing: 0;
            transition: color 0.35s ease, transform 0.2s ease;
        }

        .metric-value.cost {
            color: var(--blue);
        }

        .control-card {
            margin-top: 14px;
            padding: 17px;
            border-radius: 26px;
            background:
                linear-gradient(150deg, rgba(255,255,255,0.20), rgba(255,255,255,0.065)),
                rgba(3, 8, 17, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .card-head {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .card-title {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .card-caption {
            margin-top: 5px;
            color: rgba(248, 251, 255, 0.68);
            font-size: 13px;
            line-height: 1.45;
        }

        .time-pill {
            flex: 0 0 auto;
            min-width: 92px;
            padding: 10px 12px;
            border-radius: 18px;
            text-align: right;
            background: rgba(90, 200, 250, 0.18);
            border: 1px solid rgba(90, 200, 250, 0.36);
            color: #dff6ff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24), 0 10px 26px rgba(90, 200, 250, 0.12);
        }

        #sliderValueText {
            font-family: ui-rounded, "SF Pro Rounded", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 25px;
            line-height: 1;
            font-weight: 760;
        }

        .slider-unit {
            margin-left: 2px;
            color: rgba(223, 246, 255, 0.72);
            font-size: 12px;
            font-weight: 700;
        }

        .slider-wrap {
            position: relative;
            z-index: 1;
            margin-top: 20px;
        }

        .control-card.room-created .slider-wrap {
            display: none;
        }

        .control-card.room-created {
            background:
                linear-gradient(150deg, rgba(210, 255, 230, 0.26), rgba(255, 255, 255, 0.09)),
                rgba(48, 116, 91, 0.24);
        }

        .control-card.room-created .time-pill {
            background: rgba(52, 199, 89, 0.16);
            border-color: rgba(52, 199, 89, 0.30);
            color: #e9fff0;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 42px;
            background: transparent;
            display: block;
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 13px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.20);
            background:
                linear-gradient(90deg, var(--blue), var(--indigo)) 0 / var(--slider-fill, 26.3%) 100% no-repeat,
                rgba(255, 255, 255, 0.13);
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.30), 0 1px 0 rgba(255,255,255,0.10);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 30px;
            height: 30px;
            margin-top: -9px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: linear-gradient(180deg, #ffffff, #dceeff);
            box-shadow: 0 11px 28px rgba(90, 200, 250, 0.44), inset 0 1px 0 rgba(255, 255, 255, 0.96);
            transition: transform 0.18s cubic-bezier(0.2, 1, 0.2, 1);
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.12);
        }

        input[type=range]::-moz-range-track {
            height: 13px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background:
                linear-gradient(90deg, var(--blue), var(--indigo)) 0 / var(--slider-fill, 26.3%) 100% no-repeat,
                rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.26);
        }

        input[type=range]::-moz-range-thumb {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: linear-gradient(180deg, #ffffff, #dceeff);
            box-shadow: 0 9px 24px rgba(90, 200, 250, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .bounds {
            display: flex;
            justify-content: space-between;
            margin-top: 2px;
            color: var(--faint);
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 11px;
            font-weight: 700;
        }

        .btn-primary {
            position: relative;
            z-index: 1;
            width: 100%;
            border: 0;
            border-radius: 21px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            font-weight: 750;
            transition: transform 0.18s cubic-bezier(0.2, 1, 0.2, 1), opacity 0.18s ease;
        }

        .btn-primary {
            margin-top: 18px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(90, 200, 250, 0.96), rgba(124, 108, 255, 0.96));
            box-shadow: 0 18px 38px rgba(90, 160, 255, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.52);
        }

        .btn-primary:active {
            transform: scale(0.975);
        }

        .btn-primary:disabled {
            opacity: 0.48;
            transform: none;
            cursor: wait;
        }

        .control-card.room-created .btn-primary {
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.13)),
                rgba(52, 199, 89, 0.20);
            border: 1px solid rgba(180, 255, 210, 0.42);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.34),
                0 0 0 1px rgba(52, 199, 89, 0.12),
                0 0 22px rgba(52, 199, 89, 0.42),
                0 18px 42px rgba(52, 199, 89, 0.30);
            animation: copyGlow 1.9s ease-in-out infinite;
        }

        .control-card.room-created .btn-primary::after {
            content: "";
            position: absolute;
            inset: -70% -45%;
            background: linear-gradient(110deg, transparent 38%, rgba(255, 255, 255, 0.52) 50%, transparent 62%);
            transform: translateX(-38%) rotate(8deg);
            animation: copySheen 2.4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes copyGlow {
            0%, 100% {
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.34),
                    0 0 0 1px rgba(52, 199, 89, 0.12),
                    0 0 18px rgba(52, 199, 89, 0.34),
                    0 18px 38px rgba(52, 199, 89, 0.24);
            }
            50% {
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.44),
                    0 0 0 1px rgba(52, 199, 89, 0.22),
                    0 0 34px rgba(52, 199, 89, 0.62),
                    0 20px 50px rgba(52, 199, 89, 0.38);
            }
        }

        @keyframes copySheen {
            0%, 35% { transform: translateX(-42%) rotate(8deg); opacity: 0; }
            48% { opacity: 0.9; }
            68%, 100% { transform: translateX(42%) rotate(8deg); opacity: 0; }
        }

        @media (max-height: 720px) {
            body {
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .app-card {
                padding: 14px;
            }

            .identity-row {
                margin-top: 12px;
            }

            .identity-row h1 {
                font-size: 36px;
            }

            .metric-value {
                font-size: 29px;
            }

            .slider-wrap {
                margin-top: 14px;
            }

            .btn-primary {
                margin-top: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✓</span>
        <span id="toastMsg">操作成功</span>
    </div>

    <main class="shell">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>

        <section class="app-card">
            <div class="card-content">
                <div class="topbar"><span class="live-dot"></span> 私人通道控制台</div>

                <div class="identity-row">
                    <h1>{{UID}}</h1>
                    <div class="mini-status">最长 600s</div>
                </div>

                <div class="metrics" id="financePanel">
                    <div class="metric">
                        <div class="metric-label">可用配额</div>
                        <div class="metric-value" id="balanceDisplay">{{BALANCE}}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">单次消耗</div>
                        <div class="metric-value cost" id="costDisplay">-{{COST}}</div>
                    </div>
                </div>

                <div class="control-card">
                    <div class="card-head">
                        <div>
                            <div class="card-title" id="controlTitle">聊天室存活时间</div>
                            <div class="card-caption" id="controlCaption">选择房间闲置销毁时间，上限 600 秒。</div>
                        </div>
                        <div class="time-pill">
                            <span id="sliderValueText">120</span><span class="slider-unit">s</span>
                        </div>
                    </div>

                    <div class="slider-wrap">
                        <input type="range" id="safeTimeInput" min="30" max="600" step="10" value="120">
                        <div class="bounds">
                            <span>30s</span>
                            <span>600s</span>
                        </div>
                    </div>

                    <button class="btn-primary" id="generateBtn" onclick="handlePrimaryAction()">创建聊天室</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentBalance = parseInt("{{BALANCE}}") || 0;
        const cost = parseInt("{{COST}}") || 0;
        const accessPath = "{{ACCESS_PATH}}" || "";
        const MAX_SAFE_TIME = 600;

        let heartbeatInterval = null;
        let activeRoomUrl = "";

        const safeTimeInput = document.getElementById('safeTimeInput');
        const sliderValueText = document.getElementById('sliderValueText');
        const controlCard = document.querySelector('.control-card');
        const controlTitle = document.getElementById('controlTitle');
        const controlCaption = document.getElementById('controlCaption');
        const generateBtn = document.getElementById('generateBtn');

        function clampSafeTime(value) {
            const parsed = parseInt(value, 10);
            if (!Number.isFinite(parsed)) return 120;
            return Math.min(MAX_SAFE_TIME, Math.max(30, parsed));
        }

        function updateSliderFill() {
            const min = parseFloat(safeTimeInput.min);
            const max = parseFloat(safeTimeInput.max);
            const val = clampSafeTime(safeTimeInput.value);
            if (String(val) !== safeTimeInput.value) safeTimeInput.value = val;
            const percentage = ((val - min) / (max - min)) * 100;
            sliderValueText.innerText = val;
            safeTimeInput.style.setProperty('--slider-fill', `${percentage}%`);
        }

        safeTimeInput.addEventListener('input', updateSliderFill);
        updateSliderFill();

        function setRoomCreatedState(totalSeconds) {
            controlCard.classList.add('room-created');
            controlTitle.innerText = "聊天室已建立";
            controlCaption.innerText = "链接仅保存在当前页面内存中，点击复制后发送给用户。";
            sliderValueText.innerText = totalSeconds;
            generateBtn.innerText = "再点一次复制";
        }

        function resetRoomCreateState() {
            activeRoomUrl = "";
            controlCard.classList.remove('room-created');
            controlTitle.innerText = "聊天室存活时间";
            controlCaption.innerText = "选择房间闲置销毁时间，上限 600 秒。";
            generateBtn.innerText = "创建聊天室";
            updateSliderFill();
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');

            toastMsg.innerText = message;
            icon.innerText = isError ? "!" : "✓";
            icon.style.color = isError ? "var(--red)" : "var(--green)";

            toast.classList.add('show');
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function copyRoomUrl() {
            if (!activeRoomUrl) return;

            try {
                await navigator.clipboard.writeText(activeRoomUrl);
                showToast("直连地址已复制");
            } catch (err) {
                showToast("系统复制权限受限，请重试", true);
            }
        }

        async function handlePrimaryAction() {
            if (activeRoomUrl) {
                await copyRoomUrl();
                return;
            }
            await generateRoom();
        }

        async function generateRoom() {
            const safeTime = clampSafeTime(document.getElementById('safeTimeInput').value);

            if (currentBalance < cost) {
                showToast("配额不足，请联系系统管理员", true);
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerText = "正在创建...";

            try {
                const response = await fetch('/api/admin/generate_room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        safe_time: safeTime,
                        access_path: accessPath
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    const balanceEl = document.getElementById('balanceDisplay');
                    if (data.balance !== undefined) {
                        currentBalance = data.balance;
                        balanceEl.innerText = currentBalance;
                        balanceEl.style.color = 'var(--green)';
                        balanceEl.style.transform = 'scale(1.08)';
                        setTimeout(() => {
                            balanceEl.style.color = 'var(--text)';
                            balanceEl.style.transform = 'scale(1)';
                        }, 500);
                    }

                    activeRoomUrl = `${window.location.origin}/#${data.room_pwd}`;
                    setRoomCreatedState(safeTime);
                    showToast("聊天室已创建，点击复制直连地址");
                    startServerHeartbeat(safeTime, data.room_pwd);
                } else {
                    showToast(data.msg || "鉴权失败或网络拦截", true);
                }
            } catch (error) {
                console.error(error);
                showToast("连接服务器超时，请稍后重试", true);
            } finally {
                generateBtn.disabled = false;
                if (!activeRoomUrl) generateBtn.innerText = "创建聊天室";
            }
        }

        function startServerHeartbeat(totalSeconds, roomPwd) {
            sliderValueText.innerText = totalSeconds;

            if (heartbeatInterval) clearInterval(heartbeatInterval);

            heartbeatInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/room/time_left?room_pwd=${roomPwd}`);
                    const statusData = await res.json();

                    if (statusData.status === 'closed' || statusData.remaining_time <= 0) {
                        clearInterval(heartbeatInterval);
                        sliderValueText.innerText = "0";
                        setTimeout(() => {
                            resetRoomCreateState();
                            showToast("安全通道已关闭并清理完毕");
                        }, 900);
                    } else {
                        const timeLeft = Math.min(totalSeconds, statusData.remaining_time);
                        sliderValueText.innerText = timeLeft;
                    }
                } catch (error) {
                    console.warn("探针网络闪断，等待重连恢复...");
                }
            }, 1000);
        }
    </script>
</body>
</html>
