<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>私人通道控制终端</title>
    <style>
        /* * 设计系统：黄金比例 & 斐波那契数列
         * 尺度因子：5, 8, 13, 21, 34, 55, 89, 144, 233, 377
         */
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(30, 30, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-sub: rgba(255, 255, 255, 0.55);
            --accent-green: #32D74B;
            --accent-blue: #0A84FF;
            --accent-red: #FF453A;
            --ring-track: rgba(255, 255, 255, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden; 
            overscroll-behavior: none; 
            touch-action: manipulation; 
            -webkit-user-select: none; 
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(10, 132, 255, 0.15), #000000 60%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 13px; /* 斐波那契数 */
        }

        .main-container {
            width: 100%;
            max-width: 377px; /* 斐波那契数，完美贴合移动端视口 */
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(-2%); 
        }

        /* 身份尊称区 */
        .greeting-area {
            text-align: center;
            margin-bottom: 21px; /* 斐波那契数 */
        }
        
        .greeting-prefix {
            font-size: 13px; /* 斐波那契数 */
            color: var(--text-sub);
            letter-spacing: 1px;
            font-weight: 400;
        }

        .greeting-name {
            font-size: 34px; /* 斐波那契数 */
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #AAAAAA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 5px; /* 斐波那契数 */
        }

        /* 毛玻璃卡片基类 */
        .glass-card {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(21px);
            -webkit-backdrop-filter: blur(21px);
            border: 1px solid var(--glass-border);
            border-radius: 21px; /* 斐波那契数 */
            padding: 21px; /* 斐波那契数 */
            box-shadow: 0 13px 34px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 13px; /* 斐波那契数 */
        }

        /* 财务大盘 */
        .finance-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .finance-item {
            flex: 1;
            text-align: center;
        }

        .finance-divider {
            width: 1px;
            height: 34px; /* 斐波那契数 */
            background: var(--glass-border);
        }

        .finance-value {
            font-size: 34px; /* 斐波那契数 */
            font-weight: 300;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            margin-bottom: 5px; /* 斐波那契数 */
            text-shadow: 0 0 13px rgba(255, 255, 255, 0.1);
            transition: color 0.4s ease, transform 0.2s ease;
        }

        .finance-label {
            font-size: 13px; /* 斐波那契数 */
            font-weight: 500;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cost-highlight { color: var(--accent-blue); }

        /* 输入区 */
        .input-group { margin-bottom: 21px; }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 8px; /* 斐波那契数 */
            text-align: center;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 13px; /* 斐波那契数 */
            border: 1px solid var(--glass-border);
            padding: 5px; /* 斐波那契数 */
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 21px; /* 斐波那契数 */
            font-weight: 600;
            padding: 8px; /* 斐波那契数 */
            text-align: center;
            outline: none;
        }

        /* 极致主按钮 */
        .btn-primary {
            width: 100%;
            background: var(--btn-bg);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 13px 21px; /* 黄金比例内外距 */
            font-size: 16px; /* 视觉平衡点：13 * 1.272 ≈ 16 */
            font-weight: 600;
            border-radius: 13px; /* 斐波那契数 */
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-primary:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* 结果面板 */
        .result-panel {
            display: none;
            text-align: center;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(21px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-subtitle {
            font-size: 13px; /* 斐波那契数 */
            font-weight: 500;
            color: var(--accent-green);
            margin-bottom: 13px; /* 斐波那契数 */
            letter-spacing: 0.5px;
        }

        /* 专属复制按钮 */
        .btn-copy {
            background: rgba(10, 132, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid rgba(10, 132, 255, 0.3);
            padding: 13px 21px; /* 斐波那契矩阵 */
            font-size: 16px;
            font-weight: 600;
            border-radius: 13px; /* 斐波那契数 */
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            margin-bottom: 21px; /* 斐波那契数 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px; /* 斐波那契数 */
        }

        .btn-copy svg {
            width: 16px;
            height: 16px;
        }

        .btn-copy:active {
            transform: scale(0.95);
            background: rgba(10, 132, 255, 0.25);
        }

        /* 环形倒计时优化：尺度严格控制为 144px */
        .circular-timer {
            position: relative;
            width: 144px; /* 斐波那契数 */
            height: 144px; /* 斐波那契数 */
            margin: 0 auto 8px auto; /* 斐波那契数 */
        }

        .circular-timer svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 8px rgba(10, 132, 255, 0.3));
        }

        /* 半径计算：(144 / 2) - (5 / 2) - 安全余量 ≈ 66 */
        .timer-track, .timer-progress {
            cx: 72px; cy: 72px; r: 66px; 
            fill: transparent; stroke-width: 5px; /* 斐波那契数 */
        }

        .timer-track { stroke: var(--ring-track); }

        .timer-progress {
            stroke: var(--accent-blue);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), stroke 0.5s ease;
            /* 2 * π * 66 ≈ 414.69 */
            stroke-dasharray: 414.69; 
            stroke-dashoffset: 0;
        }

        .timer-text-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .time-value {
            font-size: 34px; /* 斐波那契数 */
            font-weight: 200;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .time-label {
            font-size: 13px; /* 斐波那契数 */
            font-weight: 500;
            color: var(--text-sub);
            margin-top: 5px; /* 斐波那契数 */
        }

        /* 灵动岛弹窗 */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(21px);
            -webkit-backdrop-filter: blur(21px);
            color: #fff;
            padding: 13px 21px; /* 斐波那契数 */
            border-radius: 55px; /* 斐波那契数 */
            font-size: 13px; /* 斐波那契数 */
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 13px 34px rgba(0,0,0,0.6);
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px; /* 斐波那契数 */
        }

        .toast.show { top: max(env(safe-area-inset-top, 55px), 55px); }
        .toast-icon { font-size: 16px; }
    </style>
</head>
<body>

    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✓</span>
        <span id="toastMsg">操作成功</span>
    </div>

    <div class="main-container">
        
        <div class="greeting-area">
            <div class="greeting-prefix">尊敬的</div>
            <div class="greeting-name">{{UID}}</div>
        </div>

        <div class="glass-card finance-panel" id="financePanel">
            <div class="finance-item">
                <div class="finance-value" id="balanceDisplay">{{BALANCE}}</div>
                <div class="finance-label">可用配额</div>
            </div>
            <div class="finance-divider"></div>
            <div class="finance-item">
                <div class="finance-value cost-highlight" id="costDisplay">-{{COST}}</div>
                <div class="finance-label">单次消耗</div>
            </div>
        </div>

        <div class="glass-card control-panel">
            <div class="input-group">
                <label>聊天室存活时间 (秒)</label>
                <div class="input-wrapper">
                    <input type="number" id="safeTimeInput" value="180" inputmode="numeric">
                </div>
            </div>
            <button class="btn-primary" id="generateBtn" onclick="generateRoom()">创建聊天室</button>
        </div>

        <div class="glass-card result-panel" id="resultPanel">
            <div class="result-subtitle">聊天室已成功建立</div>
            
            <button class="btn-copy" id="copyUrlBtn" onclick="copyRoomUrl()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                点击此处复制
            </button>

            <div class="circular-timer">
                <svg>
                    <circle class="timer-track"></circle>
                    <circle class="timer-progress" id="progressRing"></circle>
                </svg>
                <div class="timer-text-container">
                    <div class="time-value" id="countdownText">180</div>
                    <div class="time-label">销毁倒计时</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 渲染后端注入数据
        let currentBalance = parseInt("{{BALANCE}}") || 0;
        const cost = parseInt("{{COST}}") || 0;
        const accessPath = "{{ACCESS_PATH}}" || "";

        let heartbeatInterval = null;
        let activeRoomUrl = ""; 
        
        // 严格遵循数学方程：C = 2 * π * 66
        const CIRCUMFERENCE = 414.69; 

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');
            
            toastMsg.innerText = message;
            icon.innerText = isError ? "⚠️" : "✓";
            icon.style.color = isError ? "var(--accent-red)" : "var(--accent-green)";
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function copyRoomUrl() {
            if (!activeRoomUrl) return;
            
            try {
                await navigator.clipboard.writeText(activeRoomUrl);
                showToast("🔗 直连地址已复制到剪贴板");
            } catch (err) {
                showToast("系统复制权限受限，请重试", true);
            }
        }

        async function generateRoom() {
            const safeTime = parseInt(document.getElementById('safeTimeInput').value) || 180;
            const btn = document.getElementById('generateBtn');
            const resultPanel = document.getElementById('resultPanel');
            
            if (currentBalance < cost) {
                showToast("配额不足，请联系系统管理员", true);
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在配置安全参数...";
            resultPanel.style.opacity = '1';
            resultPanel.style.transform = 'translateY(0) scale(1)';

            try {
                const response = await fetch('/api/admin/generate_room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        safe_time: safeTime,
                        access_path: accessPath 
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.status === 'ok') {
                    // 扣费动画
                    const balanceEl = document.getElementById('balanceDisplay');
                    if (data.balance !== undefined) {
                        currentBalance = data.balance;
                        balanceEl.innerText = currentBalance;
                        balanceEl.style.color = 'var(--accent-green)';
                        balanceEl.style.transform = 'scale(1.1)';
                        setTimeout(() => {
                            balanceEl.style.color = 'var(--text-main)';
                            balanceEl.style.transform = 'scale(1)';
                        }, 500);
                    }

                    // 写入内存，不再暴露到 HTML 文本中
                    activeRoomUrl = `${window.location.origin}/#${data.room_pwd}`;
                    resultPanel.style.display = 'block';
                    
                    showToast("通道建立成功，点击上方按钮复制直连地址");

                    // 🚀 启动服务器心跳同步引擎
                    startServerHeartbeat(safeTime, data.room_pwd);
                } else {
                    showToast(data.msg || "鉴权失败或网络拦截", true);
                }
            } catch (error) {
                console.error(error);
                showToast("连接服务器超时，请稍后重试", true);
            } finally {
                btn.disabled = false;
                btn.innerText = "创建安全通道";
            }
        }

        function startServerHeartbeat(totalSeconds, roomPwd) {
            const textElem = document.getElementById('countdownText');
            const progressRing = document.getElementById('progressRing');
            const resultPanel = document.getElementById('resultPanel');

            // 初始化 UI
            textElem.innerText = totalSeconds;
            progressRing.style.strokeDashoffset = '0';
            progressRing.style.stroke = 'var(--accent-blue)';
            resultPanel.style.display = 'block';

            if (heartbeatInterval) clearInterval(heartbeatInterval);

            // 每 1 秒向服务器发起心跳探针
            heartbeatInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/room/time_left?room_pwd=${roomPwd}`);
                    const statusData = await res.json();

                    // 1. 服务端反馈通道已销毁或超时
                    if (statusData.status === 'closed' || statusData.remaining_time <= 0) {
                        clearInterval(heartbeatInterval);
                        textElem.innerText = "0";
                        progressRing.style.strokeDashoffset = CIRCUMFERENCE; 
                        progressRing.style.stroke = 'var(--glass-border)';
                        
                        // 清理内存中的敏感数据
                        activeRoomUrl = "";

                        // 优雅的消失动画
                        setTimeout(() => {
                            resultPanel.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                            resultPanel.style.opacity = '0';
                            resultPanel.style.transform = 'translateY(13px) scale(0.95)';
                            
                            setTimeout(() => {
                                resultPanel.style.display = 'none';
                                resultPanel.style.opacity = '1';
                                resultPanel.style.transform = 'translateY(0) scale(1)';
                                showToast("安全通道已关闭并清理完毕");
                            }, 600);
                        }, 1000);
                    } 
                    // 2. 正常同步时间 (包括聊天后的时间重置回满)
                    else {
                        let timeLeft = statusData.remaining_time;
                        textElem.innerText = timeLeft;
                        
                        const percentage = timeLeft / totalSeconds;
                        const validPercentage = Math.min(percentage, 1);
                        const offset = CIRCUMFERENCE - (validPercentage * CIRCUMFERENCE);
                        
                        // 倒计时物理平滑退回
                        progressRing.style.strokeDashoffset = offset;

                        // 状态颜色预警机制
                        if (validPercentage > 0.5) {
                            progressRing.style.stroke = 'var(--accent-blue)'; // 安全运行
                        } else if (validPercentage <= 0.2) {
                            progressRing.style.stroke = 'var(--accent-red)'; // 紧急状态
                        } else {
                            progressRing.style.stroke = '#FF9F0A'; // 预警状态
                        }
                    }
                } catch (error) {
                    console.warn("探针网络闪断，等待重连恢复...");
                }
            }, 1000); // 1秒一次精准脉冲
        }
    </script>
</body>
</html>
