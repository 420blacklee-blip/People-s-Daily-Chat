<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Loading...</title>
    <style>
        /* 极简无特征防线 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
        #decoy-frame { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>
    <iframe id="decoy-frame"></iframe>
    
    <script>
        (async function() {
            // 1. 获取 Hash，不暴露任何物理特征
            let rawHash = window.location.hash.substring(1);
            let curPwd = rawHash ? decodeURIComponent(rawHash) : "Default-room";
            
            try {
                // 2. 计算房间 Hash (与后端握手校验标准对齐)
                const msgUint8 = new TextEncoder().encode(curPwd);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                const roomId = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

                // 3. 建立探针连接
                let ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host);
                ws.binaryType = "arraybuffer"; // 【方案B】开启二进制模式，加速解析并降低负载
                
                ws.onopen = () => {
                    // 发出握手请求，伪装一个临时的 UID 进行试探
                    ws.send("JOIN:" + roomId + ":BOOTSTRAP_NODE");
                };

                ws.onmessage = async (e) => {
                    // 【方案B】优先处理二进制数据 (INJECT)
                    if (e.data instanceof ArrayBuffer) {
                        const bytes = new Uint8Array(e.data);
                        const textDecoder = new TextDecoder();
                        
                        // 提取前缀校验 (SYS_CMD:INJECT: 刚好是15个字节)
                        const prefix = textDecoder.decode(bytes.slice(0, 15));
                        
                        if (prefix === "SYS_CMD:INJECT:") {
                            // 直接零拷贝切片并解码剩余 HTML，比 base64 解析快一个数量级
                            const htmlStr = textDecoder.decode(bytes.slice(15));
                            
                            // 【方案A】建立临时缓冲池，不关闭 ws，实现零延迟复用
                            window.__bootWsQueue = [];
                            window.__bootWs = ws;
                            ws.onmessage = (ev) => window.__bootWsQueue.push(ev);
                            
                            // 内存原地渲染，彻底替换 DOM 唤醒聊天室
                            document.open();
                            document.write(htmlStr);
                            document.close();
                        }
                    } 
                    // 处理常规文本指令 (IFRAME, ERR)
                    else if (typeof e.data === 'string') {
                        let d = e.data;
                        
                        if (d.startsWith("SYS_CMD:IFRAME:")) {
                            // 🛑 验证失败：瞬间激活伪装，不留痕迹
                            let url = d.split(":").slice(2).join(":");
                            let iframe = document.getElementById('decoy-frame');
                            iframe.src = url;
                            iframe.style.display = "block";
                            ws.close();
                        } 
                        else if (d.startsWith("SYS_ERR:")) {
                            // 兜底错误提示
                            document.body.innerHTML = "<h3 style='text-align:center;margin-top:20px;font-family:sans-serif;color:#333;'>" + d.split(":")[1] + "</h3>";
                            ws.close();
                        }
                    }
                };
                
            } catch (err) {
                console.error("Boot failed.");
            }
        })();
    </script>
</body>
</html>
