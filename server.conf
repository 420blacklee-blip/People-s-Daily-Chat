# === E2EE Chatroom 服务器配置文件 (V5.8.1 Stealth Defense 版) ===
# [隐蔽防御机制]: 触发熔断后，新访客将被浏览器静默重定向渲染指定的 iframe 页面。
# 注意：所有 KEY 项建议通过 gen_pass.py 生成 salt$hash 格式，严禁填写明文。


# ==========================================
# [1. 核心网络配置]
# ==========================================
# 监听 IP 地址
BIND_IP=0.0.0.0

# 监听端口
PORT=7860

# 反向代理模式开关 (true / false)
REVERSE_PROXY=true

# ==========================================
# [2. 系统容量与生命周期限制]
# ==========================================
# 文本历史记录最大保留条数 (每个房间独立计算)
HISTORY_MAX=25

# 图片历史记录最大保留条数 (每个房间独立计算)
IMAGE_MAX=25

# 语音历史记录最大保留条数 (每个房间独立计算)
VOICE_MAX=25

# 服务器最大并发连接人数
MAX_CLIENTS=500

# 控制台 Session 登录有效时长 (单位: 秒)
SESSION_TIMEOUT=7200

# ==========================================
# [3. SSL/HTTPS 配置]
# ==========================================
# 如果不需要 SSL，请保持路径为空
SSL_CERT_PATH=
SSL_KEY_PATH=

# ==========================================
# [4. 权限与紧急安全控制]
# ==========================================

# 运维面板登录 Key
# 新格式请运行 gen_pass.py 生成：admin_key=v2$salt$iterations$auth_key
# 旧 salt$hash 格式仍可登录，但建议升级到 v2 以提高抗离线爆破能力。
admin_key=v2$3a4ade8d5ef0c2b47f1a22d34d07ebbf$260000$b5272d6d3411a4fb94905ecaa207ae1c02922bb47b67998ea4e0166ca5c12de3

# ==========================================
# [5. 态势感知与隐蔽防线]
# ==========================================
# 【新增】伪装站点 URL
# 功能：当 switch_key 触发熔断后，非白名单内的访客访问网页时，
# 整个页面将被此 iframe 覆盖，实现隐蔽伪装，防止审查探针嗅探。
iframe=https://www.people.com.cn

# 被封禁的用户 UID 列表 (使用 | 分隔，系统自动维护)
banned=

# 被封禁的恶意物理 IP 列表 (使用 | 分隔，系统自动维护)
banned_ips=

# ==========================================
# [6. 环境变量与调试]
# ==========================================
# 调试模式 (true / false)，生产环境建议关闭
DEBUG_MODE=false
