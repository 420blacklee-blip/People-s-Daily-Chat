<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Welcome to the squad！</title>
    <style>
        /* === CSS 样式定义 === */
        :root {
            /* 主题色变量 */
            --bg: #03050c; --pink: #ff5fcf; --blue: #3f72ff; --cyan: #56d8ff; --gold: #ffd36a;
            --green: #24d6a0; --violet: #8a78ff;
            /* 渐变色变量 */
            --grad-me: linear-gradient(135deg, rgba(89, 126, 255, 0.38), rgba(142, 106, 255, 0.26));
            --bubble-me: linear-gradient(145deg, rgba(86, 216, 255, 0.30), rgba(63, 114, 255, 0.25) 48%, rgba(138, 120, 255, 0.23));
            --bubble-peer: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
            /* 背景和边框颜色 */
            --bg-glass: rgba(5, 8, 16, 0.56); --border: rgba(255, 255, 255, 0.18);
            --hairline: rgba(255,255,255,0.075);
            --glass-fill: rgba(255,255,255,0.072);
            --glass-fill-light: rgba(255,255,255,0.13);
            --glass-stroke: rgba(255,255,255,0.24);
            --glass-stroke-strong: rgba(255,255,255,0.36);
            --glass-shine: rgba(255,255,255,0.42);
            /* 文本颜色 */
            --text: #f8fbff; --sub: rgba(224, 236, 255, 0.64); --danger: #ff5a63;
            --shadow-strong: 0 26px 90px rgba(0, 0, 0, 0.55);
            --shadow-soft: 0 14px 42px rgba(0, 0, 0, 0.28);
            
            /* === [核心修改] 动态视口高度变量 === */
            --app-height: 100vh; 
            
            /* === [核心修改] 弹性尺寸系统 (Fluid Scaling) === */
            /* 基础间距：最小8px，偏好1.5%视口最小边，最大14px */
            --gap-base: clamp(7px, 1.35vmin, 13px);
            /* 按钮尺寸：最小38px(防误触)，偏好11%视口最小边，最大48px(防傻大) */
            --btn-size: clamp(38px, 10.5vmin, 48px);
            /* 字体大小：根据视口宽度动态调整 */
            --font-base: clamp(14px, 4vw, 16px);
            /* 输入栏Padding：当高度不足(键盘弹出)时自动压缩 */
            --bar-pad: clamp(6px, 1.5vh, 12px); 
        }

        /* 全局样式重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        ::selection { background: rgba(100, 216, 255, 0.28); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 10px; }
        
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); 
            background:
                radial-gradient(circle at 18% 10%, rgba(86, 216, 255, 0.18), transparent 28%),
                radial-gradient(circle at 86% 4%, rgba(138, 120, 255, 0.16), transparent 26%),
                radial-gradient(circle at 50% 100%, rgba(36, 214, 160, 0.10), transparent 34%),
                var(--bg);
            overflow: hidden; 
            /* 强制使用计算出的真实高度，解决Firefox地址栏问题 */
            height: var(--app-height);
            width: 100vw;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
        }

        /* 动态背景动画 */
        .bg-anim {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(68px); opacity: 0.88;
            animation: flow 34s ease-in-out infinite;
            background:
                radial-gradient(at 8% 3%, rgba(64, 112, 255, 0.50) 0px, transparent 40%),
                radial-gradient(at 96% 8%, rgba(255, 95, 207, 0.34) 0px, transparent 35%),
                radial-gradient(at 92% 94%, rgba(36, 214, 160, 0.34) 0px, transparent 38%),
                radial-gradient(at 14% 88%, rgba(138, 120, 255, 0.42) 0px, transparent 42%),
                radial-gradient(at 48% 46%, rgba(86, 216, 255, 0.16) 0px, transparent 34%);
            background-size: 300% 300%;
        }
        @keyframes flow {
            0%, 100% { background-position: 0% 50%; transform: scale(1) rotate(0deg); }
            50% { background-position: 100% 50%; transform: scale(1.08) rotate(3deg); }
        }

        /* 主应用容器：统一加上深色玻璃背景和模糊效果 */
        #app { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.025)),
                var(--bg-glass);
            backdrop-filter: blur(18px) saturate(210%) brightness(1.08);
            -webkit-backdrop-filter: blur(18px) saturate(210%) brightness(1.08);
            isolation: isolate;
        }
        #app::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(118deg, rgba(255,255,255,0.16), transparent 25%),
                linear-gradient(rgba(86,216,255,0.026) 1px, transparent 1px),
                linear-gradient(90deg, rgba(86,216,255,0.020) 1px, transparent 1px);
            background-size: auto, 34px 34px, 34px 34px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.82), transparent 74%);
        }
        #app > * { position: relative; z-index: 1; }
        
        /* 桌面端适配：只需保留圆角和阴影 */
        @media (min-width: 768px) {
            body { align-items: center; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgb3BhY2l0eT0iMC4wNSI+PHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjQwIiBmaWxsPSIjZmZmIi8+PC9zdmc+'); }
            #app { 
                max-width: 860px; 
                /* 桌面端高度稍微留一点边距 */
                height: calc(var(--app-height) - 40px); 
                border-radius: 30px; 
                border: 1px solid rgba(255,255,255,0.16); 
                box-shadow: var(--shadow-strong), inset 0 1px 0 rgba(255,255,255,0.22); 
            }
            #chat { padding: 24px 26px 22px; }
            #input-box { padding-left: 26px; padding-right: 26px; }
        }

        /* 顶部栏 - 高度弹性 */
        header { 
            height: clamp(58px, 7.8vh, 68px); 
            padding: 0 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px;
            background:
                radial-gradient(circle at 18% 0%, rgba(255,255,255,0.16), transparent 30%),
                linear-gradient(180deg, rgba(255,255,255,0.105), rgba(255,255,255,0.022)),
                rgba(8, 12, 22, 0.24);
            backdrop-filter: blur(16px) saturate(220%) brightness(1.08);
            -webkit-backdrop-filter: blur(16px) saturate(220%) brightness(1.08);
            border-bottom: 1px solid rgba(255,255,255,0.105); 
            padding-top: env(safe-area-inset-top);
            flex-shrink: 0;
            box-shadow: 0 14px 34px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.18);
        }
        header > div:first-child {
            min-width: 0;
            flex: 1 1 auto;
        }
        header::after {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.58), transparent);
            pointer-events: none;
        }
        
        h1 {
            font-size: clamp(17px, 3.4vw, 20px); 
            margin: 0;
            color: #fff;
            text-shadow: 0 1px 16px rgba(100, 216, 255, 0.20);
            font-weight: 760; letter-spacing: 0.01em;
            /* 防溢出 */
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
        }
        @keyframes shine { to { background-position: 500%; } }

        /* 极窄屏幕隐藏清空记录的文字，只留图标 */
        @media (max-width: 400px) {
            #t-clean { display: none; }
        }

        .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; color: rgba(232,242,255,0.72); margin-top: 4px; background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.030)), rgba(255,255,255,0.014); padding: 3px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.22); min-height: 22px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1px 0 rgba(255,255,255,0.06), 0 7px 18px rgba(0,0,0,0.12); max-width: min(62vw, 410px); backdrop-filter: blur(9px) saturate(210%) brightness(1.08); -webkit-backdrop-filter: blur(9px) saturate(210%) brightness(1.08); }
        #hint { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 0 3px rgba(255,90,99,0.10), 0 0 10px var(--danger); transition: 0.3s; flex-shrink: 0; }
        .dot.on { background: var(--green); box-shadow: 0 0 0 4px rgba(54, 211, 153, 0.14), 0 0 18px rgba(54, 211, 153, 0.8); }

        .btn { 
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 28% 12%, rgba(255,255,255,0.26), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.035)),
                rgba(255,255,255,0.035); 
            border: 1px solid rgba(255,255,255,0.20); 
            color: #fff; 
            padding: 6px 13px; 
            border-radius: 999px; 
            font-size: 12px; 
            cursor: pointer; 
            display: flex; align-items: center; gap: 6px; transition: 0.3s; 
            height: clamp(28px, 5vh, 36px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1px 0 rgba(255,255,255,0.07), 0 12px 28px rgba(0,0,0,0.22);
            backdrop-filter: blur(12px) saturate(210%) brightness(1.08);
            -webkit-backdrop-filter: blur(12px) saturate(210%) brightness(1.08);
        }
        .btn::before {
            content: "";
            position: absolute;
            inset: 1px 12px auto;
            height: 36%;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.28), transparent);
            opacity: 0.75;
            pointer-events: none;
        }
        .btn:active { transform: scale(0.96); } .btn svg { position: relative; z-index: 1; width: 14px; height: 14px; opacity: 0.92; }
        .btn span { position: relative; z-index: 1; }
        #b-clean:hover { background: rgba(255, 90, 99, 0.15); border-color: rgba(255, 90, 99, 0.34); }

        /* 聊天区域 */
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 18px 16px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth; 
            overscroll-behavior: contain; /* 防止滚动穿透 */
        }

        .sys-msg { text-align: center; font-size: 12px; color: rgba(238,245,255,0.58); margin: 14px auto; padding: 8px 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.10); border-radius: 999px; animation: fade 0.5s ease-out; max-width: 90%; box-shadow: inset 0 1px 0 rgba(255,255,255,0.12); }
        .sys-msg strong { color: var(--cyan); }
        @keyframes fade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }

        .row { display: flex; gap: 10px; align-items: flex-end; animation: fly 0.32s cubic-bezier(0.2, 0.9, 0.2, 1); }
        .row.me { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes fly { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; } }

        /* 动态调整头像大小 */
        .av {
            width: clamp(38px, 10vmin, 46px); height: clamp(38px, 10vmin, 46px);
            border-radius: 42%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            overflow: hidden; position: relative; z-index: 1;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 12px 24px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.24), inset 0 -10px 28px rgba(0,0,0,0.18);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .av:hover { transform: translateY(-1px) scale(1.04); }
        .av span { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.72); line-height: 1; }
        .av::after { content: ''; position: absolute; inset: 0; border-radius: inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,0.36), inset 0 0 22px rgba(255,255,255,0.06); pointer-events: none; }

        /* 消息气泡 - 弹性宽度 */
        .bubble {
            padding: 11px 15px; border-radius: 20px;
            font-size: var(--font-base); line-height: 1.5; 
            max-width: min(72vw, 520px); /* 气泡最大宽度缩小为70vw防止贴边 */
            word-wrap: break-word; white-space: pre-wrap;
            position: relative; backdrop-filter: blur(10px) saturate(180%) brightness(1.06);
            -webkit-backdrop-filter: blur(10px) saturate(180%) brightness(1.06);
            box-shadow: var(--shadow-soft); border: 1px solid transparent; min-width: 60px;
            /* [新增] 气泡可点击效果 */
            transition: filter 0.2s; cursor: pointer;
        }
        .bubble:active { filter: brightness(0.8); }

        .bubble.img-msg {
            padding: 5px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(10px);
            box-shadow: 0 14px 32px rgba(0,0,0,0.26); transition: transform 0.2s, box-shadow 0.2s; position: relative;
        }
        .bubble.img-msg:hover { transform: translateY(-1px) scale(1.01); box-shadow: 0 18px 38px rgba(0,0,0,0.34); }
        .bubble img { max-width: 100%; max-height: 270px; border-radius: 16px; display: block; cursor: pointer; pointer-events: none; }

        .bubble.audio-msg {
            min-width: min(72vw, 270px);
            padding: 9px 10px;
            white-space: normal;
        }
        .voice-player { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .voice-play {
            width: 38px; height: 38px; min-width: 38px; border-radius: 50%;
            border: 1px solid rgba(180,235,255,0.36);
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 30% 18%, rgba(255,255,255,0.42), transparent 34%), linear-gradient(145deg, rgba(86,216,255,0.28), rgba(138,120,255,0.18));
            box-shadow: 0 0 0 1px rgba(145,226,255,0.16), 0 0 24px rgba(86,216,255,0.22), inset 0 1px 0 rgba(255,255,255,0.46);
            backdrop-filter: blur(10px) saturate(220%) brightness(1.08);
            -webkit-backdrop-filter: blur(10px) saturate(220%) brightness(1.08);
        }
        .voice-play svg { width: 18px; height: 18px; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.22)); }
        .voice-core { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 7px; }
        .voice-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11px; color: rgba(238,248,255,0.70); font-weight: 720; letter-spacing: 0.02em; }
        .voice-label { color: rgba(238,248,255,0.76); }
        .voice-time { color: rgba(255,255,255,0.84); font-variant-numeric: tabular-nums; }
        .voice-track {
            position: relative; height: 8px; border-radius: 999px; overflow: hidden; cursor: pointer;
            background: linear-gradient(180deg, rgba(255,255,255,0.17), rgba(255,255,255,0.055)), rgba(0,0,0,0.16);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.20);
        }
        .voice-fill {
            position: absolute; inset: 0 auto 0 0; width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(86,216,255,0.86), rgba(138,120,255,0.82));
            box-shadow: 0 0 18px rgba(86,216,255,0.38);
        }
        .voice-audio { display: none; }

        /* === [新增] 回复气泡内嵌样式 === */
        .rep-box { background: rgba(0,0,0,0.18); border-left: 2px solid var(--cyan); padding: 6px 9px; margin-bottom: 7px; border-radius: 10px; font-size: 0.85em; color: rgba(255,255,255,0.72); display: flex; flex-direction: column; box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); }
        .rep-box .rep-usr { font-weight: bold; color: var(--cyan); font-size: 0.9em; margin-bottom: 2px; }
        .me .rep-box { background: rgba(255,255,255,0.15); border-left-color: #fff; color: rgba(255,255,255,0.9); }
        .me .rep-box .rep-usr { color: var(--gold); }

        .img-mask { position: absolute; inset: 4px; border-radius: 14px; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; transition: opacity 0.3s; }
        .bubble.loaded .img-mask { opacity: 0; pointer-events: none; }

        .me .bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 7px; border-color: rgba(255,255,255,0.18); box-shadow: 0 14px 34px rgba(83, 128, 255, 0.28), inset 0 1px 0 rgba(255,255,255,0.30); }
        .me .bubble.img-msg { background: rgba(92, 116, 255, 0.16); box-shadow: 0 14px 32px rgba(0,0,0,0.24), 0 0 28px rgba(103, 128, 255, 0.22), inset 0 1px 1px rgba(255,255,255,0.12); }

        .row:not(.me) .bubble { background: var(--bubble-peer); border-bottom-left-radius: 7px; color: rgba(249,251,255,0.94); border: 1px solid rgba(255,255,255,0.13); box-shadow: 0 12px 30px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.12); }
        .row:not(.me) .bubble.img-msg { background: rgba(100, 216, 255, 0.08); border: 1px solid rgba(100, 216, 255, 0.13); box-shadow: 0 14px 32px rgba(0,0,0,0.24), 0 0 24px rgba(100, 216, 255, 0.12), inset 0 1px 1px rgba(255,255,255,0.08); }

        .col { display: flex; flex-direction: column; gap: 4px; }
        .me .col { align-items: flex-end; }
        .u-name { font-size: 11px; color: rgba(235,242,255,0.52); margin: 0 4px 1px; max-width: 140px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 650; letter-spacing: 0.01em; }

        .msg-status { float: right; margin-left: 6px; margin-top: 4px; display: flex; align-items: center; opacity: 0.8; height: 16px; }
        .bubble.img-msg .msg-status { float: none; position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.4); padding: 2px 4px; border-radius: 8px; margin: 0; backdrop-filter: blur(2px); }
        .bubble.audio-msg .msg-status { float: none; margin-left: 0; margin-top: 7px; justify-content: flex-end; }
        .st-icon { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* 输入区域 */
        #input-box { 
            padding: 0 16px var(--bar-pad) 16px; 
            padding-bottom: calc(var(--bar-pad) + env(safe-area-inset-bottom)); 
            position: relative; pointer-events: none; display: flex; flex-direction: column;
            width: 100%;
            min-width: 0;
            transition: padding 0.2s; /* 平滑过渡 */
        }
        /* 键盘弹出时，去掉底部安全区，防止悬空 */
        body.keyboard-open #input-box {
            padding-bottom: var(--bar-pad); 
        }
        
        /* === [新增] 底部回复预览栏 === */
        #reply-bar { background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.032)), rgba(12,18,30,0.22); backdrop-filter: blur(14px) saturate(220%) brightness(1.08); -webkit-backdrop-filter: blur(14px) saturate(220%) brightness(1.08); border-radius: 18px; padding: 9px 12px; margin-bottom: 9px; display: none; align-items: center; justify-content: space-between; font-size: 12px; color: rgba(245,248,255,0.86); pointer-events: auto; animation: pop 0.2s ease-out; border: 1px solid rgba(255,255,255,0.24); border-left: 3px solid rgba(86,216,255,0.64); box-shadow: 0 14px 34px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.30); }
        #reply-bar .rep-info { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; margin-right: 10px; }
        #reply-bar .close-rep { cursor: pointer; color: #fff; padding: 4px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; transition: 0.2s; }
        #reply-bar .close-rep:hover { background: rgba(255,59,48,0.5); }

        #bar { 
            pointer-events: auto; 
            position: relative;
            background:
                radial-gradient(circle at 18% 0%, rgba(255,255,255,0.22), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.034)),
                rgba(7, 11, 22, 0.20);
            backdrop-filter: blur(16px) saturate(230%) brightness(1.12);
            -webkit-backdrop-filter: blur(16px) saturate(230%) brightness(1.12);
            border: 1px solid rgba(255,255,255,0.28); 
            border-radius: 30px; 
            padding: var(--gap-base); 
            display: flex; 
            align-items: flex-end; 
            gap: var(--gap-base); 
            box-shadow: 0 20px 46px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.40), inset 0 -1px 0 rgba(255,255,255,0.10); 
            width: 100%;
            max-width: 100%;
            min-width: 0;
            overflow: hidden;
        }
        #bar::before {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            top: 1px;
            height: 36%;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent);
            pointer-events: none;
            opacity: 0.88;
        }
        #bar::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;

        @keyframes waveLift { 0%,100% { height: 7px; opacity: 0.55; } 50% { height: 22px; opacity: 1; } }

        /* 按钮与图标 - 弹性控制 */
        .icon {

        .icon:hover { background: linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0.055)); color: #fff; transform: translateY(-1px); } .icon svg { position: relative; z-index: 1; width: 50%; height: 50%; }
        .voice-btn { color: var(--cyan); }

        #txt {

        #txt:focus { background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.035)), rgba(86,216,255,0.016); border-color: rgba(145,226,255,0.46); box-shadow: inset 0 1px 0 rgba(255,255,255,0.38), 0 0 0 3px rgba(86,216,255,0.12), 0 10px 28px rgba(86,216,255,0.10); }

        #send::before {
            content: "";

            right: 20%;

        }
        #send:active { transform: scale(0.95); box-shadow: 0 0 0 1px rgba(145,226,255,0.20), 0 0 14px rgba(86,216,255,0.38), 0 8px 20px rgba(75, 125, 255, 0.28), inset 0 1px 0 rgba(255,255,255,0.30); }
        #send svg { position: relative; z-index: 1; width: 50%; height: 50%; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.28)); }

        /* === [新增] 黑框上下文菜单 === */
        #ctx-menu { position: fixed; background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.035)), rgba(12,16,28,0.26); border: 1px solid rgba(255,255,255,0.24); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.28); z-index: 9999; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(16px) saturate(230%) brightness(1.08); -webkit-backdrop-filter: blur(16px) saturate(230%) brightness(1.08); min-width: 148px; transform: scale(0.94); opacity: 0; transition: 0.15s cubic-bezier(0.2, 0.9, 0.2, 1); pointer-events: none; transform-origin: top left; }

        @keyframes glow { 50% { box-shadow: 0 0 15px rgba(255,69,58,0.2); } }

        #modal { position: fixed; inset: 0; z-index: 100; background: rgba(3,6,14,0.62); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); display: none; justify-content: center; align-items: center; animation: fade 0.2s; }
        .card { background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.045)), rgba(12,17,30,0.46); border: 1px solid rgba(255,255,255,0.22); width: 85%; max-width: 320px; padding: 30px; border-radius: 30px; text-align: center; animation: pop 0.3s; box-shadow: 0 26px 78px rgba(0,0,0,0.56), inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1px 0 rgba(255,255,255,0.06); backdrop-filter: blur(34px) saturate(215%) brightness(1.06); -webkit-backdrop-filter: blur(34px) saturate(215%) brightness(1.06); }
        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
        .m-in { width: 100%; background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.035)), rgba(0,0,0,0.16); border: 1px solid rgba(255,255,255,0.18); padding: 16px; border-radius: 18px; color: #fff; font-size: 18px; text-align: center; font-weight: bold; margin: 24px 0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.20); backdrop-filter: blur(18px) saturate(180%); -webkit-backdrop-filter: blur(18px) saturate(180%); }
        .m-in:focus { border-color: rgba(86,216,255,0.36); box-shadow: inset 0 1px 0 rgba(255,255,255,0.24), 0 0 0 3px rgba(86,216,255,0.09), 0 0 22px rgba(86,216,255,0.12); }
        .acts { display: flex; gap: 12px; }
        .act { flex: 1; padding: 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.18); font-weight: 700; cursor: pointer; backdrop-filter: blur(18px) saturate(180%); -webkit-backdrop-filter: blur(18px) saturate(180%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 24px rgba(0,0,0,0.18); }
        .b-can { background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.035)); color: rgba(238,244,255,0.78); }
        .b-sav { background: linear-gradient(145deg, rgba(86,216,255,0.28), rgba(63,114,255,0.18)); color: #fff; border-color: rgba(145,226,255,0.32); }

        #load { display: none; }
        #f-in { display: none; }

        @media (max-width: 520px) {
            :root {
                --gap-base: 7px;
                --btn-size: clamp(36px, 9.7vw, 42px);
                --font-base: clamp(14px, 3.85vw, 15px);

            header { height: clamp(74px, 10.5vh, 90px); padding-left: 12px; padding-right: 12px; align-items: center; gap: 9px; }
            h1 { font-size: clamp(19px, 5.3vw, 22px); letter-spacing: 0; line-height: 1.1; }
            .badge { max-width: calc(100vw - 106px); padding: 4px 10px; min-height: 24px; font-size: 11px; margin-top: 5px; background: rgba(255,255,255,0.056); }
            .btn { width: 40px; height: 40px; min-width: 40px; padding: 0; justify-content: center; border-radius: 50%; background: radial-gradient(circle at 28% 12%, rgba(255,255,255,0.23), transparent 36%), linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.032)), rgba(255,255,255,0.030); box-shadow: inset 0 1px 0 rgba(255,255,255,0.32), inset 0 -1px 0 rgba(255,255,255,0.06), 0 9px 22px rgba(0,0,0,0.18); }
            .btn svg { width: 16px; height: 16px; }
            #t-clean { display: none; }
            #chat { padding: 13px 12px 18px; gap: 13px; }

            #txt { padding-left: 11px; padding-right: 11px; border-radius: 18px; }

            .icon svg, #send svg { width: 48%; height: 48%; }

            .voice-live { gap: 8px; padding: 8px 10px; border-radius: 20px; }

            #voice-clock { font-size: 11px; }

        }

        @media (max-width: 360px) {
            :root { --btn-size: 35px; --gap-base: 6px; }
            #input-box { padding-left: 8px; padding-right: 8px; }
            #bar { padding: 7px; }
            #txt { padding-left: 9px; padding-right: 9px; }
            #voice-status { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-anim, h1, .row, .sys-msg, #alert, #modal, .card, #reply-bar {
                animation: none !important;
            }
            #chat { scroll-behavior: auto; }
        }
    </style>
</head>
<body>
<div class="bg-anim"></div>
<div id="app">
    <header>
        <div>
            <h1 id="t-tit"></h1>
            <div class="badge"><span id="dot" class="dot"></span><span id="hint"></span></div>
        </div>
        <button id="b-clean" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>

<script>
(async function() {
    /* === [新增] 音频提示音引擎 (带10秒防轰炸控制) === */
    const bellAudio = new Audio('/static/ios-bell.mp3');
    bellAudio.preload = 'auto'; // 核心：告诉浏览器页面一打开就预下载到本地
    let lastBellTime = 0;

    function playNotification() {
        let now = Date.now();

            if (REPLAY_CACHE.has(header.n)) return null;

            const payloadHashBuf = await window.crypto.subtle.digest('SHA-256', decryptedBody);

            const blob = new Blob([decryptedBody], {type: header.mime || (payloadType === "audio" ? "audio/webm" : "image/webp")});

            REPLAY_CACHE.add(header.n);

        else return { bg: `linear-gradient(${Ang}deg, hsl(${H1},${S}%,${L}%), hsl(${H2},${S}%,${L+5}%), hsl(${H1},${S}%,${L-5}%))` };

    function formatVoiceTime(seconds) {
        const safe = Math.max(0, Math.floor(seconds || 0));
        const m = Math.floor(safe / 60).toString().padStart(2, '0');
        const s = (safe % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function bindVoicePlayer(player, audio, durationSeconds) {
        const btn = player.querySelector('.voice-play');
        const fill = player.querySelector('.voice-fill');
        const time = player.querySelector('.voice-time');
        const track = player.querySelector('.voice-track');
        let total = Math.max(1, Math.min(30, Math.round(durationSeconds || 0)));

        const render = () => {
            const current = Math.min(audio.currentTime || 0, total);
            const pct = Math.max(0, Math.min(100, (current / total) * 100));
            fill.style.width = `${pct}%`;
            time.textContent = `${formatVoiceTime(current)} / ${formatVoiceTime(total)}`;
            btn.innerHTML = audio.paused ? VOICE_PLAY_ICON : VOICE_PAUSE_ICON;
        };

        btn.innerHTML = VOICE_PLAY_ICON;
        time.textContent = `00:00 / ${formatVoiceTime(total)}`;

        audio.addEventListener('loadedmetadata', () => {
            if (Number.isFinite(audio.duration) && audio.duration > 0) {
                total = Math.max(1, Math.min(30, Math.round(audio.duration)));
                render();
            }
        });
        audio.addEventListener('timeupdate', render);
        audio.addEventListener('play', render);
        audio.addEventListener('pause', render);
        audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            render();
        });

        btn.onclick = e => {
            e.stopPropagation();
            if (audio.paused) {
                document.querySelectorAll('.voice-audio').forEach(item => { if (item !== audio) item.pause(); });
                audio.play().catch(() => {});
            }
            else audio.pause();
        };
        track.onclick = e => {
            e.stopPropagation();
            const rect = track.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audio.currentTime = pct * total;
            render();
        };
    }

    async function trySend() {
        if (isFatalError) return;
        if (isSending || !ws || ws.readyState !== 1 || msgQueue.length === 0) return;
        isSending = true;

        try {
            while (msgQueue.length > 0) {
                if (ws.readyState !== 1) break;
                const payload = msgQueue.shift();
                if (payload instanceof ArrayBuffer) {
                    const waitMs = IMAGE_SEND_INTERVAL_MS - (Date.now() - lastBinarySendAt);
                    if (waitMs > 0) await new Promise(resolve => setTimeout(resolve, waitMs));
                }
                ws.send(payload);
                if (payload instanceof ArrayBuffer) lastBinarySendAt = Date.now();
            }
        } catch (e) { console.error("Send Err:", e); } finally {
            isSending = false;
            if (msgQueue.length > 0 && ws.readyState === 1) trySend();
        }
    }

    async function connect() {
        if (isFatalError) return;
        if (!curPwd) return;

        // === [方案 A] 核心：拦截并复用 Bootstrap WebSocket ===
        if (window.__bootWs && window.__bootWs.readyState === 1) {
            console.log("⚡ 触发零延迟启动: 复用 Bootstrap WS 通道");
            ws = window.__bootWs;
            ws.binaryType = "arraybuffer";
            
            // 1. 绑定真实的事件处理
            ws.onclose = realOnCloseHandler;
            ws.onmessage = realOnMessageHandler;
            
            // 2. 补发真实身份，覆盖后端的 BOOTSTRAP_NODE
            let roomId = await getRoomId(curPwd);
            ws.send("JOIN:" + roomId + ":" + uid);

            // 探针数据补发（复用通道时也应上报态势感知）
            try {
                let probeData = await getClientProbeData();
                ws.send("PROBE:" + JSON.stringify(probeData));
            } catch(e) { }
            
            // 3. 处理在 DOM 渲染期间堆积的缓冲消息
            if (window.__bootWsQueue) {
                window.__bootWsQueue.forEach(ev => realOnMessageHandler(ev));
            }
            
            // 4. 清理全局桥梁，释放内存
            delete window.__bootWs;
            delete window.__bootWsQueue;
            
            $('dot').classList.add('on');
            trySend();
            return;
        }

        // === 降级：走标准新建流程 ===
        ws = new WebSocket((location.protocol=="https:"?"wss":"ws")+"://"+location.host);
        ws.binaryType = "arraybuffer";

        ws.onopen = async () => {
            reconnectAttempts = 0;
            if(connectAlertTimer) { clearTimeout(connectAlertTimer); connectAlertTimer = null; }
            UI.alert.style.display='none'; $('dot').classList.add('on');

            try {
                let probeData = await getClientProbeData();
                ws.send("PROBE:" + JSON.stringify(probeData));
            } catch(e) { }
            // ============================

            trySend();
        };

        ws.onclose = realOnCloseHandler;
        ws.onmessage = realOnMessageHandler;
    }

    async function encryptVoiceBlob(task) {
        const fileBuffer = await task.blob.arrayBuffer();
        if (fileBuffer.byteLength > MAX_VOICE_PACKET_SIZE - 8192) {
            alert(L.vbig);
            removePendingBubble(task.nonce);
            return false;
        }

        const hashBuf = await window.crypto.subtle.digest('SHA-256', fileBuffer);
        const hashHex = buf2hex(hashBuf);

        const ts = Date.now();
        const nonce = task.nonce;
        const signature = await signData(nonce + ts + uid + hashHex);
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const header = {
            type: "audio",
            mime: task.blob.type || "audio/webm",
            dur: Math.max(1, Math.min(30, Math.round(task.duration / 1000))),
            u: uid,
            t: ts,
            n: nonce,
            k: myIdentity.pubHex,
            s: signature,
            iv: buf2hex(iv),
            sl: buf2hex(salt),
            v: KDF_VERSION
        };
        const encHeader = new TextEncoder().encode(JSON.stringify(header));
        const key = await deriveKey(curPwd, salt);
        const encryptedBody = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, fileBuffer);

        const packet = new Uint8Array(4 + encHeader.byteLength + encryptedBody.byteLength);
        const dv = new DataView(packet.buffer);
        dv.setUint32(0, encHeader.byteLength, true);
        packet.set(encHeader, 4);
        packet.set(new Uint8Array(encryptedBody), 4 + encHeader.byteLength);

        if (packet.byteLength > MAX_VOICE_PACKET_SIZE) {
            alert(L.vbig);
            removePendingBubble(nonce);
            return false;
        }

        msgQueue.push(packet.buffer);
        trySend();

        queueMicrotask(() => {
            let el = $('st-' + nonce);
            if (el) el.innerHTML = ICONS.check;
            let bub = $('bub-' + nonce);
            if (bub) bub.classList.add('loaded');
        });
        return true;
    }

            duration: durationMs,
            mimeType: mimeType || "audio/webm"
        };
        setVoiceUi('ready', durationMs);
        return true;
    }

        if (isFatalError) return;
        if (activeReplyTarget) $('btn-cancel-rep').click();
        if (pendingVoice) cancelVoiceRecording();
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === "undefined") {
            alert(L.vuns);
            return;
        }

        const mimeType = pickAudioMime();
        try {
            voiceStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    channelCount: 1
                }
            });
        } catch(e) {
            alert(L.vden);
            cleanupVoiceRecorder();
            return;
        }

        clearPendingVoice();
        voiceChunks = [];
        const options = { audioBitsPerSecond: 64000 };
        if (mimeType) options.mimeType = mimeType;

        try {
            voiceRecorder = new MediaRecorder(voiceStream, options);
        } catch(e) {
            try {
                voiceRecorder = new MediaRecorder(voiceStream);
            } catch(err) {
                alert(L.vuns);
                cleanupVoiceRecorder();
                return;
            }
        }

        voiceStartedAt = Date.now();
        const recorder = voiceRecorder;
        recorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) voiceChunks.push(e.data);
        };
        recorder.onstop = async () => {
            const durationMs = Math.min(Date.now() - voiceStartedAt, MAX_VOICE_DURATION_MS);
            const actualMime = recorder.mimeType || mimeType || "audio/webm";
            cleanupVoiceRecorder();
            if (discardVoiceOnStop) {
                clearPendingVoice();
                setVoiceUi('idle');
                return;
            }
            const ready = prepareVoiceRecording(voiceChunks, actualMime, durationMs);
            if (ready && sendVoiceOnStop) {
                sendVoiceOnStop = false;
                try { await sendPendingVoice(); }
                catch(e) { console.error("Voice encrypt err:", e); alert(L.vbig); }
            }
        };
        recorder.onerror = () => {
            alert(L.vuns);
            cleanupVoiceRecorder();
            clearPendingVoice();
            setVoiceUi('idle');
        };

        recorder.start(1000);
        setVoiceUi('recording', 0);
        voiceTickTimer = setInterval(() => updateVoiceClock(Date.now() - voiceStartedAt), 250);
        voiceStopTimer = setTimeout(() => stopVoiceRecording(), MAX_VOICE_DURATION_MS);
    }

    function stopVoiceRecording() {
        if (!voiceRecorder || voiceRecorder.state === "inactive") return;
        try { voiceRecorder.stop(); }
        catch(e) { cleanupVoiceRecorder(); }
    }

    async function toggleVoiceRecording() {
        if (voiceRecorder && voiceRecorder.state === "recording") {
            stopVoiceRecording();
            return;
        }
        if (pendingVoice) {
            await sendPendingVoice();
            return;
        }
        await startVoiceRecording();
    }

    $('b-pwd').onclick = toggleVoiceRecording;
    $('voice-cancel').onclick = cancelVoiceRecording;
    $('voice-confirm').onclick = () => sendPendingVoice().catch(e => { console.error("Voice send err:", e); alert(L.vbig); });
    $('b-img').onclick = () => { if (!isFatalError) UI.fIn.click(); };
    window.addEventListener('beforeunload', () => {
        discardVoiceOnStop = true;
        try { if (voiceRecorder && voiceRecorder.state === "recording") voiceRecorder.stop(); } catch(e) {}
        cleanupVoiceRecorder();
        clearPendingVoice();
    });

    const handleFiles = async (files) => {
        if (isFatalError) return;
        if(files.length > MAX_IMAGE_BATCH) return alert(L.onl);
        if(files.length === 0) return;
        for(let i=0; i<files.length; i++){ if (files[i].type.indexOf("image") === -1) { alert(L.onl); UI.fIn.value = ''; return; } }

        let taskList = [];
        for(let i=0; i<files.length; i++) {
            let nonce = Math.random().toString(36).substr(2, 9);
            let blobUrl = URL.createObjectURL(files[i]);
            append({uid: uid, text: blobUrl, nonce: nonce}, true, true);
            taskList.push({ file: files[i], nonce: nonce, blobUrl: blobUrl });
        }
        UI.fIn.value = '';

        try { await Promise.all(taskList.map(task => compressAndEncrypt(task))); } catch(e) { console.error("Batch upload err:", e); }
    };

    UI.fIn.onchange = (e) => handleFiles(e.target.files);

    // === [提速重构] 压缩+加密
    //   1) 原图本来就够小且尺寸合理 → 跳过 canvas，直接发原始字节
    //   2) 二分质量 + 必要时缩尺寸，通常 1~2 次 toBlob 就能命中目标
    //   3) header 带 v:2 让接收端走 HKDF
    //   4) push 到队列后本地立刻打勾，不等服务端 echo
    async function compressAndEncrypt(task) {
        const MAX_BLOB_SIZE = 1000 * 1024;   // 留 24KB 给加密头与签名
        const INITIAL_LIMIT = 2048;
        const FAST_PATH_TYPES = ['image/webp', 'image/jpeg'];

        let img = await new Promise((resolve, reject) => {
            let im = new Image();
            im.onload = () => resolve(im);
            im.onerror = reject;
            im.src = task.blobUrl;
        });

        let fileBuffer = null;

        // ---- 快速路径：原图就符合要求，无需重压 ----
        if (FAST_PATH_TYPES.includes(task.file.type)
            && task.file.size <= MAX_BLOB_SIZE
            && img.width <= INITIAL_LIMIT && img.height <= INITIAL_LIMIT) {
            fileBuffer = await task.file.arrayBuffer();
        } else {
            // ---- 慢速路径：canvas 重压，二分质量 ----
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');

            let w = img.width, h = img.height;
            if (w > INITIAL_LIMIT || h > INITIAL_LIMIT) {
                const r = Math.min(INITIAL_LIMIT/w, INITIAL_LIMIT/h);
                w = Math.floor(w*r); h = Math.floor(h*r);
            }
            canvas.width = w; canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);

            // 二分质量：在 [qLow, qHigh] 内逼近，通常 1~2 次命中
            let qLow = 0.3, qHigh = 0.95, q = 0.85;
            let blob = null;

            for (let i = 0; i < 4; i++) {
                blob = await new Promise(r => canvas.toBlob(r, 'image/webp', q));
                if (!blob) break;

                if (blob.size <= MAX_BLOB_SIZE) {
                    // 命中目标且未浪费太多余量(>70%)就停；否则可以再加质量
                    if (blob.size >= MAX_BLOB_SIZE * 0.7 || i >= 1) break;
                    qLow = q; q = (q + qHigh) / 2;
                } else {
                    qHigh = q; q = (qLow + q) / 2;
                }
            }

            // 兜底：质量已到下限还是太大 → 缩尺寸
            for (let i = 0; i < 4 && blob && blob.size > MAX_BLOB_SIZE; i++) {
                w = Math.max(1, Math.floor(w * 0.75));
                h = Math.max(1, Math.floor(h * 0.75));
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.7));
            }

            if (!blob || blob.size > MAX_BLOB_SIZE) {
                alert("图片过于复杂，无法压缩至 1MB 以内，请换一张图片！");
                let bub = document.getElementById('bub-' + task.nonce);
                if (bub && bub.parentNode) bub.parentNode.parentNode.removeChild(bub.parentNode);
                URL.revokeObjectURL(task.blobUrl);
                return;
            }
            fileBuffer = await blob.arrayBuffer();
        }

        // ---- 后续：签名 + 加密 + 打包 ----
        const hashBuf = await window.crypto.subtle.digest('SHA-256', fileBuffer);
        const hashHex = buf2hex(hashBuf);

        const ts = Date.now();
        const nonce = task.nonce;
        const signContent = nonce + ts + uid + hashHex;
        const signature = await signData(signContent);

        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));

        // [v2] header 携带版本号，接收端按 v 路由 KDF
        const header = { u: uid, t: ts, n: nonce, k: myIdentity.pubHex, s: signature, iv: buf2hex(iv), sl: buf2hex(salt), v: KDF_VERSION };
        const headerStr = JSON.stringify(header);
        const encHeader = new TextEncoder().encode(headerStr);
        const headerLen = encHeader.byteLength;

        const key = await deriveKey(curPwd, salt);   // 走 v2 HKDF（命中主密钥缓存）
        const encryptedBody = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, fileBuffer);

        const totalLen = 4 + headerLen + encryptedBody.byteLength;
        const packet = new Uint8Array(totalLen);
        const dv = new DataView(packet.buffer);
        dv.setUint32(0, headerLen, true);
        packet.set(encHeader, 4);
        packet.set(new Uint8Array(encryptedBody), 4 + headerLen);

        // 最终防御：加密头加进来后仍然超 1MB，清气泡
        if (packet.byteLength > 1024 * 1024) {
            alert("图片过于复杂，无法压缩至 1MB 以内，请换一张图片！");
            let bub = document.getElementById('bub-' + task.nonce);
            if (bub && bub.parentNode) bub.parentNode.parentNode.removeChild(bub.parentNode);
            URL.revokeObjectURL(task.blobUrl);
            return;
        }

        msgQueue.push(packet.buffer);
        trySend();

        // [提速] 本地立刻打勾，不等服务端 echo；若后端仍 echo 回来也只是再赋值同样状态，无副作用
        queueMicrotask(() => {
            let el = $('st-' + task.nonce);
            if (el) el.innerHTML = ICONS.check;
            let bub = $('bub-' + task.nonce);
            if (bub) bub.classList.add('loaded');
        });

        URL.revokeObjectURL(task.blobUrl);
    }

    function showModal(force=false) {
        $('m-icon').innerText="🔐"; $('m-tit').innerText=L.mtk; $('m-desc').innerHTML=L.mdk; UI.min.placeholder=L.mtkp; 
        UI.min.value=""; // <--- 强制设为空字符串，确保弹窗弹出时没有残留文字
        UI.mod.style.display='flex'; UI.min.focus();
        if (force) $('m-can').style.display = 'none'; else $('m-can').style.display = 'block';
    }

    $('b-clean').onclick = () => { if (confirm(L.confirm_clr)) { UI.chat.innerHTML = ''; UI.chat.appendChild(mk('div','sys-msg',`<div>${L.w1}</div><div style="margin-top:6px;opacity:0.8">${L.w2}</div>`, true)); } };
    $('m-can').onclick = () => UI.mod.style.display='none';

    $('m-sav').onclick = async () => {
        let v = UI.min.value.trim() || "Default-room"; // 如果为空，则赋值为 "Default-room"
        let isFirstLoad = (curPwd === "");
        if(mode==='p' || isFirstLoad) {
            curPwd = v; history.replaceState(null, null, '#' + encodeURIComponent(v));
            UI.hint.textContent = L.pre + v; UI.mod.style.display = 'none';
            if (isFirstLoad) connect();
            else { UI.chat.innerHTML = ''; UI.chat.appendChild(mk('div','sys-msg',`<div>${L.w1}</div><div style="margin-top:6px;opacity:0.8">${L.w2}</div>`, true)); msgs.clear(); if(ws) ws.close(); alert(L.ku); }
        }
    };

    $('send').onclick = send;
    UI.txt.onkeydown = e => { if(e.key==="Enter" && !e.shiftKey && window.innerWidth>768) { e.preventDefault(); send(); } };
    UI.txt.oninput = function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; };

    document.addEventListener('paste', async (e) => {
        if (isFatalError) return;
        let items = (e.clipboardData || window.clipboardData).items;
        let files = [];
        if (items) { for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf("image") !== -1) { files.push(items[i].getAsFile()); } } }
        if (files.length > 0) { e.preventDefault(); handleFiles(files); }
    });

    if (!curPwd) {
        curPwd = "Default-room"; // 赋予初始默认值
        UI.hint.textContent = L.pre + curPwd; // 更新界面上的房间名显示
        connect(); // 直接开始连接，不再弹窗打扰用户
    } else {
        connect();
    }
})();
</script>
